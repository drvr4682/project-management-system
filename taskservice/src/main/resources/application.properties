spring.application.name=taskservice
server.port=8083

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/task_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Internal security
internal.secret=${INTERNAL_SECRET}

# Service URLs — override per environment via env vars
services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
services.project.url=${PROJECT_SERVICE_URL:http://localhost:8082}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# Logging
logging.level.root=INFO
logging.level.com.pms.taskservice=DEBUG
logging.pattern.level=%5p [${spring.application.name}] [X-Correlation-Id=%X{X-Correlation-Id}]

# ── Resilience4j Circuit Breaker ──────────────────────────────────────────────
# auth-service circuit breaker
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.register-health-indicator=true

# project-service circuit breaker
resilience4j.circuitbreaker.instances.project-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.project-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.project-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.project-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.project-service.register-health-indicator=true

# ── Resilience4j Retry ────────────────────────────────────────────────────────
resilience4j.retry.instances.auth-service.max-attempts=3
resilience4j.retry.instances.auth-service.wait-duration=500ms
resilience4j.retry.instances.auth-service.retry-exceptions=java.io.IOException,feign.RetryableException

resilience4j.retry.instances.project-service.max-attempts=3
resilience4j.retry.instances.project-service.wait-duration=500ms
resilience4j.retry.instances.project-service.retry-exceptions=java.io.IOException,feign.RetryableException

# ── Resilience4j TimeLimiter ──────────────────────────────────────────────────
resilience4j.timelimiter.instances.auth-service.timeout-duration=3s
resilience4j.timelimiter.instances.project-service.timeout-duration=3s