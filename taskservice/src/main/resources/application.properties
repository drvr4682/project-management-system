spring.application.name=taskservice
server.port=8083

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/task_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Internal security
internal.secret=${INTERNAL_SECRET}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# Logging
logging.level.root=INFO
logging.level.com.pms.taskservice=DEBUG
logging.pattern.level=%5p [${spring.application.name}] [X-Correlation-Id=%X{X-Correlation-Id}]