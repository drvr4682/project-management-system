spring.application.name=apigateway
server.port=8080

# JWT
jwt.secret=${JWT_SECRET}

# Downstream service URLs — set per environment via .env or system env vars
services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
services.project.url=${PROJECT_SERVICE_URL:http://localhost:8082}
services.task.url=${TASK_SERVICE_URL:http://localhost:8083}

# Rate limiting
rate.limit.replenish-rate=${RATE_LIMIT_REPLENISH:10}
rate.limit.burst-capacity=${RATE_LIMIT_BURST:20}

# Gateway
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

# Redis (for rate limiting)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# Logging
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.pms.apigateway=DEBUG